services:
  quietisles:
    image: ghcr.io/aiulian25/quietisles:latest
    container_name: quietisles
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "2145:2145"
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
